<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart TTU Monthly Report – กฟภ. สาขาจอมเทียน</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #0d1b2a; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

  .topbar {
    background: linear-gradient(135deg, #1a2e4a 0%, #0d1b2a 100%);
    border-bottom: 2px solid #2563eb;
    padding: 0 20px;
    height: 56px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
    box-shadow: 0 2px 16px rgba(37,99,235,0.35);
  }
  .logo { font-size: 20px; font-weight: 800; color: #fff; display: flex; align-items: center; gap: 8px; white-space: nowrap; }
  .logo .bolt { color: #f59e0b; font-size: 22px; }
  .logo .sub { font-size: 11px; font-weight: 400; color: #94a3b8; }
  .logo-col { display: flex; flex-direction: column; }
  .divider { width: 1px; height: 32px; background: #334155; flex-shrink: 0; }

  .select-wrap { position: relative; display: flex; align-items: center; gap: 8px; }
  .select-wrap label { font-size: 13px; color: #cbd5e1; white-space: nowrap; }

  select#monthPicker {
    appearance: none; -webkit-appearance: none;
    background: #1e3a5f;
    border: 1.5px solid #2563eb;
    color: #fff;
    font-size: 14px; font-weight: 700;
    padding: 7px 38px 7px 14px;
    border-radius: 8px;
    cursor: pointer; outline: none;
    transition: border-color .2s, box-shadow .2s;
    min-width: 220px;
  }
  select#monthPicker:hover, select#monthPicker:focus {
    border-color: #60a5fa;
    box-shadow: 0 0 0 3px rgba(37,99,235,.25);
  }
  .arrow { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); pointer-events: none; color: #60a5fa; font-size: 11px; }

  .badge {
    background: rgba(37,99,235,.15);
    border: 1px solid rgba(37,99,235,.4);
    color: #93c5fd;
    font-size: 11px; padding: 4px 12px;
    border-radius: 20px; white-space: nowrap;
  }

  #reportFrame { flex: 1; width: 100%; border: none; background: #fff; }

  #overlay {
    position: fixed; inset: 56px 0 0 0;
    background: #0d1b2a;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 16px;
    z-index: 100; transition: opacity .3s;
  }
  #overlay.hidden { opacity: 0; pointer-events: none; }
  .spinner {
    width: 44px; height: 44px;
    border: 4px solid #1e3a5f; border-top-color: #2563eb;
    border-radius: 50%; animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { color: #94a3b8; font-size: 14px; }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">
    <span class="bolt">&#9889;</span>
    <div class="logo-col">
      <span>Smart TTU Report</span>
      <span class="sub">กฟภ. สาขาจอมเทียน</span>
    </div>
  </div>

  <div class="divider"></div>

  <div class="select-wrap">
    <label for="monthPicker">เลือกเดือน :</label>
    <div style="position:relative">
      <select id="monthPicker" onchange="changeMonth(this.value)">
        <option value="may-2569.html" selected>&#128197; พฤษภาคม 2569 (ล่าสุด)</option>
        <option value="april-2569.html">&#128197; เมษายน 2569</option>
        <option value="march-2569.html">&#128197; มีนาคม 2569</option>
      </select>
      <span class="arrow">&#9660;</span>
    </div>
  </div>

  <div class="divider"></div>
  <span class="badge" id="badge">&#128197; พฤษภาคม 2569</span>
  <div style="flex:1"></div>
  <span style="font-size:11px;color:#475569">PEA Jomtien Smart Grid</span>
</div>

<div id="overlay">
  <div class="spinner"></div>
  <div class="loading-text" id="loadText">กำลังโหลดรายงาน...</div>
</div>

<iframe id="reportFrame"></iframe>

<script>
var labelsTH = {
  'may-2569.html':   'พฤษภาคม 2569',
  'april-2569.html': 'เมษายน 2569',
  'march-2569.html': 'มีนาคม 2569'
};
var _ts = Date.now();
function bust(src) { return src + '?t=' + _ts; }
function changeMonth(src) {
  _ts = Date.now();
  var name = labelsTH[src] || src;
  document.getElementById('overlay').classList.remove('hidden');
  document.getElementById('loadText').textContent = 'กำลังโหลด ' + name + ' ...';
  document.getElementById('badge').textContent = '\ud83d\udcc5 ' + name;
  document.getElementById('reportFrame').src = bust(src);
}
function hideOverlay() {
  document.getElementById('overlay').classList.add('hidden');
}
// Use addEventListener so hideOverlay is defined before load event fires
document.getElementById('reportFrame').addEventListener('load', hideOverlay);
// Fallback: hide overlay after 20s if load event does not fire
setTimeout(hideOverlay, 20000);
// Load latest month with cache-busting timestamp
document.getElementById('reportFrame').src = bust('may-2569.html');
</script>
</body>
</html>
